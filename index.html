<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartDC Academy | Production-Ready Networking & Automation</title>
  
  <style>
    :root {
      --bg-color: #0a192f;
      --card-bg: #112240;
      --accent: #64ffda;
      --text-main: #e6f1ff;
      --text-dim: #8892b0;
      --border: #233554;
      --cta-glow: rgba(100, 255, 218, 0.2);
    }

    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      line-height: 1.6;
      background: var(--bg-color);
      color: var(--text-main);
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 8%;
      background: rgba(10, 25, 47, 0.95);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo { font-weight: bold; font-size: 1.5rem; color: var(--accent); text-decoration: none; letter-spacing: 1px; }
    .nav-links a { color: var(--text-main); text-decoration: none; margin-left: 25px; font-size: 0.9rem; font-weight: 500; }
    .nav-links a:hover { color: var(--accent); }

    header {
      padding: 120px 20px;
      text-align: center;
      background: linear-gradient(rgba(10, 25, 47, 0.9), rgba(10, 25, 47, 0.9)), 
                  url('https://images.unsplash.com/photo-1558494949-ef010cbdcc31') no-repeat center/cover;
    }

    header h1 { font-size: 3.5rem; color: var(--accent); margin-bottom: 20px; line-height: 1.1; }
    header p { font-size: 1.4rem; color: var(--text-main); max-width: 850px; margin: auto; font-weight: 300; }

    /* SALES-FOCUSED INTRODUCTION */
    .hero-intro {
      background: var(--card-bg);
      padding: 80px 20px;
      border-bottom: 1px solid var(--border);
    }

    .intro-container {
      max-width: 1000px;
      margin: auto;
    }

    .intro-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 50px;
      align-items: center;
    }

    @media (max-width: 768px) {
      .intro-grid { grid-template-columns: 1fr; text-align: center; }
    }

    .intro-text h2 { color: var(--accent); font-size: 2.2rem; margin-bottom: 20px; }
    .intro-text p { font-size: 1.1rem; color: var(--text-dim); margin-bottom: 20px; }

    .value-props {
      list-style: none;
      padding: 0;
    }

    .value-props li {
      margin-bottom: 15px;
      padding-left: 30px;
      position: relative;
      color: var(--text-main);
      font-weight: 500;
    }

    .value-props li::before {
      content: "✓";
      position: absolute;
      left: 0;
      color: var(--accent);
      font-weight: bold;
    }

    /* COURSE GRID */
    .container { max-width: 1100px; margin: 80px auto; padding: 0 20px; }
    
    .course-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 30px;
    }

    .card {
      background: var(--bg-color);
      padding: 40px;
      border-radius: 12px;
      border: 1px solid var(--border);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .card:hover { border-color: var(--accent); transform: translateY(-10px); box-shadow: 0 10px 30px var(--cta-glow); }
    .card h3 { color: var(--accent); margin-top: 15px; font-size: 1.5rem; }
    .card ul { padding-left: 20px; color: var(--text-dim); margin-top: 20px; }
    .badge { background: rgba(100, 255, 218, 0.1); color: var(--accent); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; padding: 5px 12px; border-radius: 20px; }

    /* CONVERSION FORM */
    .cta-box {
      background: linear-gradient(135deg, var(--card-bg) 0%, #1d2d50 100%);
      padding: 80px 40px;
      text-align: center;
      border-radius: 20px;
      border: 1px solid var(--accent);
      margin-top: 100px;
    }

    form { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 40px; }
